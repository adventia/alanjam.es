<!DOCTYPE html>
<html lang="en" ng-app="portfolio">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Before &amp; After — Alan James</title>

  <link rel="icon" type="image/svg+xml" href="../favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- build:css ../css/portfolio.min.css -->
  <link rel="stylesheet" href="../css/main.css">
  <!-- endbuild -->

  <style>
    .compare {
      position: relative;
      max-width: 980px;
      margin: 0 auto;
      border-radius: 8px;
      overflow: hidden;
      cursor: col-resize;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .compare__after {
      display: block;
      width: 100%;
      height: auto;
    }

    .compare__before-wrap {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 50%;
      overflow: hidden;
    }

    .compare__before {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left center;
    }

    .compare__handle {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 3px;
      background: #fff;
      transform: translateX(-50%);
      z-index: 2;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
    }

    .compare__handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }

    .compare__handle-arrows {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    .compare__arrow {
      width: 0;
      height: 0;
      border-style: solid;
    }

    .compare__arrow--left {
      border-width: 6px 8px 6px 0;
      border-color: transparent #2A2824 transparent transparent;
    }

    .compare__arrow--right {
      border-width: 6px 0 6px 8px;
      border-color: transparent transparent transparent #2A2824;
    }

    .compare__labels {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      z-index: 1;
      pointer-events: none;
    }

    .compare__label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      padding: 5px 10px;
      border-radius: 4px;
      letter-spacing: 0.02em;
    }

    .compare-section {
      padding: 120px 0 80px;
    }

    .compare-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .compare-header__label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      color: #9B9690;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .compare-header__title {
      font-family: 'Lora', serif;
      font-size: 32px;
      font-weight: 400;
      color: #2A2824;
    }

    .compare-caption {
      text-align: center;
      margin-top: 20px;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      color: #9B9690;
    }

    @media (max-width: 767px) {
      .compare-section {
        padding: 80px 16px 48px;
      }

      .compare-header__title {
        font-size: 24px;
      }

      .compare {
        border-radius: 0;
        margin-left: -16px;
        margin-right: -16px;
      }

      .compare-caption {
        padding: 0 16px;
      }
    }
  </style>
</head>

<body class="cs" ng-controller="PortfolioCtrl as vm">

  <!-- Nav -->
  <nav class="nav" aria-label="Main navigation" ng-class="{ 'nav--scrolled': vm.scrolled }">
    <div class="nav__inner">
      <div class="nav__left">
        <a href="../index.html" class="nav__logo">alanjam<span class="nav__logo-tld">.es</span></a>
      </div>
      <div class="nav__links">
        <a href="../index.html#work" class="nav__link">All work</a>
        <a href="../index.html#contact" class="nav__link">Contact</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="compare-section">
      <div class="container">
        <div class="compare-header">
          <div class="compare-header__label">Photoshop Generative Fill</div>
          <h1 class="compare-header__title">Before &amp; after</h1>
        </div>
      </div>

      <div class="container">
        <div class="compare" id="compare">
          <!-- After image (full, sits behind) -->
          <picture>
            <source srcset="../img/alan-james-stage.webp" type="image/webp">
            <img class="compare__after" src="../img/alan-james-stage.jpg" alt="After: retouched hero image" draggable="false">
          </picture>

          <!-- Before image (clipped) -->
          <div class="compare__before-wrap" id="compareBeforeWrap">
            <picture>
              <source srcset="../img/alan-james-stage-before.webp" type="image/webp">
              <img class="compare__before" src="../img/alan-james-stage-before.jpg" alt="Before: original hero image" draggable="false">
            </picture>
          </div>

          <!-- Slider handle -->
          <div class="compare__handle" id="compareHandle">
            <div class="compare__handle-arrows">
              <div class="compare__arrow compare__arrow--left"></div>
              <div class="compare__arrow compare__arrow--right"></div>
            </div>
          </div>

          <!-- Labels -->
          <div class="compare__labels">
            <span class="compare__label">Before</span>
            <span class="compare__label">After</span>
          </div>
        </div>

        <p class="compare-caption">Drag the slider to compare the original and retouched images</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var compare = document.getElementById('compare');
      var handle = document.getElementById('compareHandle');
      var beforeWrap = document.getElementById('compareBeforeWrap');
      var isDragging = false;

      function setPosition(x) {
        var rect = compare.getBoundingClientRect();
        var pos = (x - rect.left) / rect.width;
        pos = Math.max(0.02, Math.min(0.98, pos));
        var pct = pos * 100 + '%';
        beforeWrap.style.width = pct;
        handle.style.left = pct;
      }

      // Mouse
      compare.addEventListener('mousedown', function (e) {
        e.preventDefault();
        isDragging = true;
        setPosition(e.clientX);
      });

      document.addEventListener('mousemove', function (e) {
        if (!isDragging) return;
        e.preventDefault();
        setPosition(e.clientX);
      });

      document.addEventListener('mouseup', function () {
        isDragging = false;
      });

      // Touch
      compare.addEventListener('touchstart', function (e) {
        isDragging = true;
        setPosition(e.touches[0].clientX);
      });

      document.addEventListener('touchmove', function (e) {
        if (!isDragging) return;
        setPosition(e.touches[0].clientX);
      });

      document.addEventListener('touchend', function () {
        isDragging = false;
      });
    })();
  </script>

  <!-- AngularJS (CDN — not bundled) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

  <!-- build:js ../js/portfolio.min.js -->
  <script src="../js/app.js"></script>
  <!-- endbuild -->

</body>
</html>
